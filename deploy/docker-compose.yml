# NIGHTPASS public demo, single preview instance behind Caddy (auto-TLS).
# See deploy/README.md for the five manual steps; full background in
# docs/public-demo.md.
services:
  nightpass:
    build: ..
    restart: unless-stopped
    env_file: .env
    environment:
      NIGHTGATE_REPLICA_COUNT: "1"
      cds_requires_db_credentials_host: postgres
      cds_requires_db_credentials_port: "5432"
      cds_requires_db_credentials_user: nightpass
      cds_requires_db_credentials_password: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      cds_requires_db_credentials_database: nightpass
    expose: ["4004"]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nightpass
      POSTGRES_USER: nightpass
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightpass -d nightpass"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - passport-pg-data:/var/lib/postgresql/data

  # ---- "Try it" demo instance (profile: demo, off by default) --------------
  # Anchors visitor passports on preview with a dedicated sponsor wallet and
  # publishes them into the main explorer via the ingest endpoint. Start with
  # `docker compose --profile demo up -d` AFTER filling .env.demo and swapping
  # in Caddyfile.demo (see README, "Try-it demo instance").
  nightpass-demo:
    build: ..
    restart: unless-stopped
    profiles: ["demo"]
    env_file: .env.demo
    environment:
      NIGHTGATE_REPLICA_COUNT: "1"
      cds_requires_db_credentials_host: postgres-demo
      cds_requires_db_credentials_port: "5432"
      cds_requires_db_credentials_user: nightpass_demo
      cds_requires_db_credentials_password: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
      cds_requires_db_credentials_database: nightpass_demo
    expose: ["4004"]
    depends_on:
      proof-server:
        condition: service_started
      postgres-demo:
        condition: service_healthy

  postgres-demo:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["demo"]
    environment:
      POSTGRES_DB: nightpass_demo
      POSTGRES_USER: nightpass_demo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nightpass_demo -d nightpass_demo"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - passport-demo-pg-data:/var/lib/postgresql/data

  # ZK proof server for the demo instance's anchor/proof transactions.
  # Internal network only, never published to the host.
  proof-server:
    image: midnightntwrk/proof-server:8.1.0
    restart: unless-stopped
    profiles: ["demo"]
    command: ["midnight-proof-server"]
    expose: ["6300"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    environment:
      DEMO_DOMAIN: ${DEMO_DOMAIN}
      # Subdomain of the "Try it" demo; only read once Caddyfile.demo is
      # swapped in (README, "Try-it demo instance"). The non-empty fallback is
      # a guard: an EMPTY value would expand to a Caddy site block with no
      # address and break config load for BOTH domains; 'demo.invalid' merely
      # fails its own cert issuance while the main site keeps serving.
      TRY_DOMAIN: ${TRY_DOMAIN:-demo.invalid}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  passport-pg-data:
  passport-demo-pg-data:
  caddy-data:
  caddy-config:
